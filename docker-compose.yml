# Hermes Agent — Docker Compose Stack
# Docs: https://hermes-agent.nousresearch.com/docs/user-guide/docker
# GitHub: https://github.com/nousresearch/hermes-agent
#
# Security posture:
#   - Ports bound to HERMES_BIND_ADDR (127.0.0.1 by default — localhost only)
#   - Only two host directories are mounted: HERMES_DATA_DIR and HERMES_WORKSPACE_DIR
#   - No privileged mode; no host network
#   - Hard resource limits on both containers
#   - Services communicate over an isolated internal bridge network

services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    ports:
      - "${HERMES_BIND_ADDR:-127.0.0.1}:${HERMES_GATEWAY_PORT:-8642}:8642"
    volumes:
      # Config, memory, sessions, skills — agent's persistent state
      - type: bind
        source: ${HERMES_DATA_DIR:?HERMES_DATA_DIR must be set in .env}
        target: /opt/data
      # Workspace — files the agent may read/write on the host
      - type: bind
        source: ${HERMES_WORKSPACE_DIR:?HERMES_WORKSPACE_DIR must be set in .env}
        target: /opt/data/workspace
    environment:
      # Hermes reads its own credentials from /opt/data/.env (i.e. ~/.hermes/.env).
      # Run 'docker run -it --rm -v ~/.hermes:/opt/data nousresearch/hermes-agent setup'
      # to configure LLM keys, Telegram token, allowed users, etc.
      # The variables below are optional overrides — they take lower precedence
      # than /opt/data/.env for keys Hermes manages itself.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    networks:
      - hermes-internal
    shm_size: ${HERMES_SHM_SIZE:-1g}
    deploy:
      resources:
        limits:
          memory: ${HERMES_MEMORY_LIMIT:-4G}
          cpus: "${HERMES_CPU_LIMIT:-2.0}"
    healthcheck:
      # Port 8642 only opens when an LLM provider is fully configured.
      # Check gateway.pid instead — written as soon as the process is running.
      test: ["CMD", "python3", "-c", "import json,os; d=json.load(open('/opt/data/gateway.pid')); os.kill(d['pid'], 0)"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 30s

  hermes-dashboard:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    # --insecure is required to bind 0.0.0.0 inside the container.
    # Security is enforced at the host layer: HERMES_BIND_ADDR=127.0.0.1
    # means the port is never reachable beyond localhost on the host machine.
    command: dashboard --host 0.0.0.0 --insecure
    ports:
      - "${HERMES_BIND_ADDR:-127.0.0.1}:${HERMES_DASHBOARD_PORT:-9119}:9119"
    volumes:
      # Read-only: dashboard only reads agent state, never writes
      - type: bind
        source: ${HERMES_DATA_DIR:?HERMES_DATA_DIR must be set in .env}
        target: /opt/data
        # read_only: kanban needs this, possibly a bug
    environment:
      # Points to the internal service name — never exposed to the host
      - GATEWAY_HEALTH_URL=http://hermes:8642
      - GATEWAY_HEALTH_TIMEOUT=3
    networks:
      - hermes-internal
    depends_on:
      hermes:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${HERMES_DASHBOARD_MEMORY_LIMIT:-512M}
          cpus: "${HERMES_DASHBOARD_CPU_LIMIT:-0.5}"

networks:
  hermes-internal:
    driver: bridge
